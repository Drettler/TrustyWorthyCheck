<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TrustWorthy Check - Spot Scams Before They Cost You</title>
    <meta
      name="description"
      content="Check if a website is legit before you buy. TrustworthyCheck scans for scams, fake stores, unsafe payments, and suspicious business details in under 2 minutes."
    />
    <meta name="impact-site-verification" content="59c01973-1fb1-4a13-b175-3602a6d055e5" />
    <meta name="author" content="TrustWorthy Check" />
    <meta
      name="keywords"
      content="scam checker, website legitimacy, is this website safe, trust score, online shopping safety, spot scams, red flags"
    />

    <!-- Preconnect to external origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Optimized font loading with display=swap -->
    <link
      rel="preload"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Nunito:wght@600;700;800&display=swap"
      as="style"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript
      ><link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Nunito:wght@600;700;800&display=swap"
    /></noscript>

    <meta property="og:url" content="https://trustworthycheck.com/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="TrustworthyCheck" />

    <meta property="og:title" content="Scam or Legit? Check Before You Buy | TrustworthyCheck" />
    <meta
      property="og:description"
      content="Instantly check if a site is legit. Scan for red flags, fake reviews, and risky domains in under 2 minutes. Teen-safe, parent-approved."
    />

    <meta property="og:image" content="https://trustworthycheck.com/og-image.png" />
    <meta property="og:image:secure_url" content="https://trustworthycheck.com/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="TrustworthyCheck preview: Scam or Legit? Check any website in under 2 minutes."
    />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@ScamOrLegit" />
    <meta name="twitter:title" content="Scam or Legit? Check Before You Buy | TrustworthyCheck" />
    <meta
      name="twitter:description"
      content="Instantly check if a site is legit. Scan for red flags, fake reviews, and risky domains in under 2 minutes. Teen-safe, parent-approved."
    />
    <meta name="twitter:image" content="https://trustworthycheck.com/og-image.png" />

    <link rel="icon" href="/favicon.png" type="image/png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="canonical" href="https://trustworthycheck.com/" />

    <!-- Structured Data - Organization -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "TrustworthyCheck",
        "url": "https://trustworthycheck.com",
        "logo": "https://trustworthycheck.com/favicon.png",
        "description": "Free website safety checker that helps you spot scams, fake stores, and fraudulent websites before they cost you money.",
        "sameAs": ["https://twitter.com/ScamOrLegit"],
        "contactPoint": {
          "@type": "ContactPoint",
          "contactType": "customer support",
          "availableLanguage": "English"
        }
      }
    </script>

    <!-- Structured Data - WebSite with SearchAction -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "TrustworthyCheck",
        "url": "https://trustworthycheck.com",
        "description": "Check if a website is legit before you buy. Scans for scams, fake stores, unsafe payments, and suspicious business details.",
        "potentialAction": {
          "@type": "SearchAction",
          "target": {
            "@type": "EntryPoint",
            "urlTemplate": "https://trustworthycheck.com/?check={search_term_string}"
          },
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <!-- Structured Data - WebApplication -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "TrustworthyCheck Website Safety Checker",
        "url": "https://trustworthycheck.com",
        "applicationCategory": "SecurityApplication",
        "operatingSystem": "Any",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "featureList": [
          "Website trust score analysis",
          "Scam detection",
          "SSL certificate verification",
          "Domain age checking",
          "Red flag identification"
        ]
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
