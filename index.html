<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TrustWorthyCheck - Spot Scams Before They Cost You</title>
    <meta
      name="description"
      content="Check if a website is legit before you buy. TrustworthyCheck scans for scams, fake stores, unsafe payments, and suspicious business details in under 2 minutes."
    />
    <meta name="impact-site-verification" content="59c01973-1fb1-4a13-b175-3602a6d055e5" />
    <meta name="author" content="TrustWorthyCheck" />
    <meta
      name="keywords"
      content="scam checker, website legitimacy, is this website safe, trust score, online shopping safety, spot scams, red flags"
    />

    <!-- Preconnect to external origins -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Optimized font loading with display=swap -->
    <link
      rel="preload"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Nunito:wght@600;700;800&display=swap"
      as="style"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript
      ><link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Nunito:wght@600;700;800&display=swap"
    /></noscript>

    <meta property="og:url" content="https://trustworthycheck.com/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="TrustworthyCheck" />

    <meta property="og:title" content="Scam or Legit? Check Before You Buy | TrustworthyCheck" />
    <meta
      property="og:description"
      content="Instantly check if a site is legit. Scan for red flags, fake reviews, and risky domains in under 2 minutes. Teen-safe, parent-approved."
    />

    <meta property="og:image" content="https://trustworthycheck.com/og-image.png?v=2" />
    <meta property="og:image:secure_url" content="https://trustworthycheck.com/og-image.png?v=2" />

    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="TrustworthyCheck preview: Scam or Legit? Check any website in under 2 minutes."
    />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@ScamOrLegit" />
    <meta name="twitter:title" content="Scam or Legit? Check Before You Buy | TrustworthyCheck" />
    <meta
      name="twitter:description"
      content="Instantly check if a site is legit. Scan for red flags, fake reviews, and risky domains in under 2 minutes. Teen-safe, parent-approved."
    />
    <meta name="twitter:image" content="https://trustworthycheck.com/og-image.png?v=2" />

    <link rel="icon" href="/favicon.png" type="image/png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="canonical" href="https://trustworthycheck.com/" />

    <!-- Structured Data - Organization -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "TrustworthyCheck",
        "url": "https://trustworthycheck.com",
        "logo": "https://trustworthycheck.com/favicon.png",
        "description": "Free website safety checker that helps you spot scams, fake stores, and fraudulent websites before they cost you money.",
        "sameAs": ["https://twitter.com/ScamOrLegit"],
        "contactPoint": {
          "@type": "ContactPoint",
          "contactType": "customer support",
          "availableLanguage": "English"
        }
      }
    </script>

    <!-- Structured Data - WebSite with SearchAction -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "TrustworthyCheck",
        "url": "https://trustworthycheck.com",
        "description": "Check if a website is legit before you buy. Scans for scams, fake stores, unsafe payments, and suspicious business details.",
        "potentialAction": {
          "@type": "SearchAction",
          "target": {
            "@type": "EntryPoint",
            "urlTemplate": "https://trustworthycheck.com/?check={search_term_string}"
          },
          "query-input": "required name=search_term_string"
        }
      }
    </script>

    <!-- Structured Data - WebApplication -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "TrustworthyCheck Website Safety Checker",
        "url": "https://trustworthycheck.com",
        "applicationCategory": "SecurityApplication",
        "operatingSystem": "Any",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "featureList": [
          "Website trust score analysis",
          "Scam detection",
          "SSL certificate verification",
          "Domain age checking",
          "Red flag identification"
        ],
        "aggregateRating": {
          "@type": "AggregateRating",
          "ratingValue": "4.8",
          "ratingCount": "1250",
          "bestRating": "5",
          "worstRating": "1"
        }
      }
    </script>

    <!-- Structured Data - FAQ -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "How do I check if a website is legit?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Paste the website URL into TrustworthyCheck's free scanner. We analyze domain age, SSL certificates, business registration, user reports, and known scam databases to give you a trust score and safety verdict in under 2 minutes."
            }
          },
          {
            "@type": "Question",
            "name": "Is TrustworthyCheck free to use?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes! TrustworthyCheck offers free website safety checks. You get 3 free scans per day. For unlimited scans and detailed PDF reports, you can upgrade to our premium plan."
            }
          },
          {
            "@type": "Question",
            "name": "What does a website trust score mean?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "The trust score (0-100) indicates how safe a website is. Scores above 70 are generally safe, 40-70 require caution, and below 40 are high-risk. We check SSL certificates, domain age, business info, and scam reports to calculate this score."
            }
          },
          {
            "@type": "Question",
            "name": "How can I tell if an online store is a scam?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Look for red flags like: new domain (under 6 months), missing contact info, no SSL certificate, prices too good to be true, poor grammar, and no social media presence. TrustworthyCheck automatically checks all these factors for you."
            }
          },
          {
            "@type": "Question",
            "name": "Can I report a scam website?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes! After scanning any website, you can report it as a scam. Your report helps protect others and updates our threat database in real-time."
            }
          }
        ]
      }
    </script>

    <!-- Structured Data - BreadcrumbList -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "BreadcrumbList",
        "itemListElement": [
          {
            "@type": "ListItem",
            "position": 1,
            "name": "Home",
            "item": "https://trustworthycheck.com/"
          },
          {
            "@type": "ListItem",
            "position": 2,
            "name": "Website Checker",
            "item": "https://trustworthycheck.com/website-checker"
          }
        ]
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
